<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#d1d5d7",
              "secondary-fixed": "#d9dff5",
              "on-tertiary": "#ffeff1",
              "on-tertiary-container": "#640430",
              "on-surface-variant": "#595c5d",
              "on-primary": "#f8f0ff",
              "error-container": "#f74b6d",
              "secondary-fixed-dim": "#cbd1e6",
              "tertiary": "#9d365b",
              "outline": "#757778",
              "outline-variant": "#abadae",
              "on-tertiary-fixed": "#380018",
              "on-secondary-fixed": "#373d4e",
              "error-dim": "#a70138",
              "on-tertiary-fixed-variant": "#701039",
              "surface-tint": "#6a37d4",
              "primary-dim": "#5e26c7",
              "inverse-primary": "#a078ff",
              "surface-variant": "#dadddf",
              "on-secondary-fixed-variant": "#535a6b",
              "on-surface": "#2c2f30",
              "primary": "#6a37d4",
              "primary-container": "#ae8dff",
              "inverse-on-surface": "#9b9d9e",
              "surface-container-high": "#e0e3e4",
              "surface-container-low": "#eff1f2",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed-variant": "#370086",
              "surface-bright": "#f5f6f7",
              "error": "#b41340",
              "on-secondary": "#f0f2ff",
              "on-error-container": "#510017",
              "secondary-dim": "#494f61",
              "on-secondary-container": "#495061",
              "tertiary-fixed": "#ff8eb0",
              "tertiary-fixed-dim": "#f67ca3",
              "primary-fixed-dim": "#a27cff",
              "on-error": "#ffefef",
              "background": "#f5f6f7",
              "secondary": "#545b6d",
              "primary-fixed": "#ae8dff",
              "tertiary-dim": "#8e294f",
              "on-primary-container": "#2b006e",
              "on-primary-fixed": "#000000",
              "surface-container-highest": "#dadddf",
              "surface-container": "#e6e8ea",
              "on-background": "#2c2f30",
              "secondary-container": "#d9dff5",
              "tertiary-container": "#ff8eb0",
              "surface": "#f5f6f7",
              "inverse-surface": "#0c0f10"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #6a37d4;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(106, 55, 212, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background font-body text-on-background antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl shadow-sm flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-violet-600 dark:text-violet-400 hover:opacity-80 transition-opacity active:scale-95 duration-200 cursor-pointer" data-icon="settings_input_antenna">settings_input_antenna</span>
</div>
<div class="absolute left-1/2 -translate-x-1/2 flex items-center">
<span class="text-xl font-black tracking-[0.2em] text-slate-900 dark:text-white font-['Manrope']">BONSAI</span>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest overflow-hidden border-2 border-primary-container hover:opacity-80 transition-opacity active:scale-95 duration-200 cursor-pointer">
<img alt="User profile avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCnYlBak_ZeFX5oGzC3tUOkg4_0zr577R_awQXzXZF7iROdF5hz_C8lFQXYbLE-i6sdUwM_GIMFE86d7gZt3qoHnP8RO-8kQjQxR_piLrpXQHctmrXRpCs-zPjH0-stV63BBYY_F5i15-ZxiVhXP4vizj-orPoI2WTXe6QJx9E0e9Qk9Zoxc6Qfui4jtAbXb39DEFJGHMW6r61tA7zpySXgRGAggSpWz5hLAA_vb-goCfBFr22W0iUlia4v-Wjo6t8O_jD5dtrX44k"/>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto space-y-8">
<!-- Header Section -->
<section class="mb-10">
<h1 class="font-headline text-5xl font-extrabold tracking-tight text-on-background mb-2">Settings</h1>
<p class="text-on-surface-variant font-medium">Fine-tune your spatial experience.</p>
</section>
<!-- Audio & Voice Bento Group -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Volume Control Card -->
<div class="bg-surface-container-lowest p-6 rounded-lg space-y-6">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined text-primary p-2 bg-primary-container/20 rounded-full" data-icon="volume_up">volume_up</span>
<span class="font-headline font-bold text-sm tracking-wider uppercase text-on-surface-variant">Audio</span>
</div>
<div>
<label class="block font-headline font-bold text-lg mb-4">Volume</label>
<input class="w-full h-1.5 bg-surface-container-high rounded-full appearance-none cursor-pointer accent-primary" max="100" min="0" type="range" value="75"/>
<div class="flex justify-between mt-2 text-xs font-bold text-outline-variant">
<span>MIN</span>
<span>MAX</span>
</div>
</div>
</div>
<!-- Voice Speed Card -->
<div class="bg-surface-container-lowest p-6 rounded-lg space-y-6">
<div class="flex items-center justify-between">
<span class="material-symbols-outlined text-primary p-2 bg-primary-container/20 rounded-full" data-icon="speed">speed</span>
<span class="font-headline font-bold text-sm tracking-wider uppercase text-on-surface-variant">Speech</span>
</div>
<div>
<label class="block font-headline font-bold text-lg mb-4">Voice Speed</label>
<input class="w-full h-1.5 bg-surface-container-high rounded-full appearance-none cursor-pointer accent-primary" max="2.0" min="0.5" step="0.1" type="range" value="1.0"/>
<div class="flex justify-between mt-2 text-xs font-bold text-outline-variant">
<span>0.5X</span>
<span>1.0X</span>
<span>2.0X</span>
</div>
</div>
</div>
</div>
<!-- Language & Display Section -->
<div class="bg-surface-container-lowest rounded-lg p-1">
<div class="p-6 space-y-8">
<!-- Language Dropdown -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="language">language</span>
<div>
<p class="font-headline font-bold">Language</p>
<p class="text-xs text-on-surface-variant">Primary system voice</p>
</div>
</div>
<select class="bg-surface-container-low border-none rounded-full px-6 py-2 font-headline font-bold text-sm focus:ring-2 focus:ring-primary appearance-none cursor-pointer">
<option>English (US)</option>
<option>Japanese (JP)</option>
<option>French (FR)</option>
<option>German (DE)</option>
</select>
</div>
<!-- Image Quality Selector -->
<div class="flex flex-col gap-4">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="high_quality">high_quality</span>
<div>
<p class="font-headline font-bold">Image Quality</p>
<p class="text-xs text-on-surface-variant">Balance visual fidelity and battery life</p>
</div>
</div>
<div class="grid grid-cols-3 gap-2 bg-surface-container-low p-1 rounded-full">
<button class="py-2 rounded-full font-headline font-bold text-xs bg-surface-container-lowest shadow-sm text-primary">ECO</button>
<button class="py-2 rounded-full font-headline font-bold text-xs text-on-surface-variant hover:bg-white/50 transition-colors">HD</button>
<button class="py-2 rounded-full font-headline font-bold text-xs text-on-surface-variant hover:bg-white/50 transition-colors">ULTRA</button>
</div>
</div>
</div>
</div>
<!-- System Section -->
<div class="space-y-4">
<h2 class="font-headline font-bold text-sm tracking-[0.2em] text-outline-variant uppercase px-2">Device System</h2>
<!-- About Device -->
<button class="w-full flex items-center justify-between bg-surface-container-lowest p-5 rounded-lg hover:opacity-80 transition-opacity active:scale-[0.98]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="info">info</span>
<span class="font-headline font-bold">About Device</span>
</div>
<div class="flex items-center gap-2">
<span class="text-xs font-bold text-outline-variant">BONSAI v2.1</span>
<span class="material-symbols-outlined text-outline-variant text-lg" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<!-- Firmware Update -->
<button class="w-full flex items-center justify-between bg-surface-container-lowest p-5 rounded-lg hover:opacity-80 transition-opacity active:scale-[0.98] border-2 border-primary-container/10">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary" data-icon="system_update">system_update</span>
<span class="font-headline font-bold">Firmware Update</span>
</div>
<div class="flex items-center gap-3">
<span class="flex h-2 w-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-xs font-bold text-primary">UPDATE READY</span>
<span class="material-symbols-outlined text-primary text-lg" data-icon="chevron_right">chevron_right</span>
</div>
</button>
</div>
<!-- Sign Out Button -->
<button class="w-full py-4 rounded-full font-headline font-bold text-error bg-error/10 hover:bg-error/20 transition-colors active:scale-95 duration-200 mt-8">
            Disconnect Device
        </button>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-6 left-0 right-0 z-50 flex justify-around items-center px-4 py-2 bg-white/70 dark:bg-slate-900/70 backdrop-blur-2xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] mx-auto w-[90%] rounded-full">
<!-- Live View Tab -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 w-14 h-14 hover:text-violet-500 transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="videocam">videocam</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest mt-1">Live View</span>
</button>
<!-- Devices Tab -->
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 w-14 h-14 hover:text-violet-500 transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="bluetooth">bluetooth</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest mt-1">Devices</span>
</button>
<!-- Settings Tab (Active) -->
<button class="flex flex-col items-center justify-center bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-full w-14 h-14 translate-y-[-4px] active:scale-90">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Inter'] text-[10px] font-semibold uppercase tracking-widest mt-1">Settings</span>
</button>
</nav>
</body></html>
