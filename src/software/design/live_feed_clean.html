<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bonsai - Live View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#d1d5d7",
              "secondary-fixed": "#d9dff5",
              "on-tertiary": "#ffeff1",

              "on-surface-variant": "#595c5d",
              "on-primary": "#f8f0ff",
              "error-container": "#f74b6d",
              "secondary-fixed-dim": "#cbd1e6",
              "tertiary": "#9d365b",
              "outline": "#757778",
              "outline-variant": "#abadae",
              "on-tertiary-fixed": "#380018",
              "on-secondary-fixed": "#373d4e",
              "error-dim": "#a70138",
              "on-tertiary-fixed-variant": "#701039",
              "surface-tint": "#6a37d4",
              "primary-dim": "#5e26c7",
              "inverse-primary": "#a078ff",
              "surface-variant": "#dadddf",
              "on-secondary-fixed-variant": "#535a6b",
              "on-surface": "#2c2f30",
              "primary": "#6a37d4",
              "primary-container": "#ae8dff",
              "inverse-on-surface": "#9b9d9e",
              "surface-container-high": "#e0e3e4",
              "surface-container-low": "#eff1f2",

              "on-primary-fixed-variant": "#370086",
              "surface-bright": "#f5f6f7",
              "error": "#b41340",

              "on-error-container": "#510017",
              "secondary-dim": "#494f61",
              "on-secondary-container": "#495061",
              "tertiary-fixed": "#ff8eb0",
              "tertiary-fixed-dim": "#f67ca3",
              "primary-fixed-dim": "#a27cff",
              "on-error": "#ffefef",
              "background": "#f5f6f7",
              "secondary": "#545b6d",
              "primary-fixed": "#ae8dff",
              "tertiary-dim": "#8e294f",
              "on-primary-container": "#2b006e",
              "on-primary-fixed": "#000000",
              "surface-container-highest": "#dadddf",
              "surface-container": "#e6e8ea",

              "secondary-container": "#d9dff5",
              "tertiary-container": "#ff8eb0",
              "surface": "#f5f6f7",
              "inverse-surface": "#0c0f10"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-transition-no-border {
            border: none !important;
        }
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl shadow-sm dark:shadow-none flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-violet-600 dark:text-violet-400 text-2xl active:scale-95 duration-200 cursor-pointer" data-icon="settings_input_antenna">settings_input_antenna</span>
<h1 class="text-xl font-black tracking-[0.2em] text-slate-900 dark:text-white font-['Manrope']">BONSAI</h1>
</div>
<div class="flex items-center gap-4">
<div class="hidden md:flex items-center gap-6 mr-4">
<a class="text-violet-600 dark:text-violet-400 font-bold tracking-tighter text-sm hover:opacity-80 transition-opacity" href="#">Live View</a>
<a class="text-slate-500 dark:text-slate-400 font-bold tracking-tighter text-sm hover:opacity-80 transition-opacity" href="#">Devices</a>
<a class="text-slate-500 dark:text-slate-400 font-bold tracking-tighter text-sm hover:opacity-80 transition-opacity" href="#">Settings</a>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high overflow-hidden border-2 border-primary-container hover:opacity-80 transition-opacity active:scale-95 duration-200 cursor-pointer">
<img alt="User profile avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBIifqDHWxvaUTjvZ_MLwJ_QhZfs7MTgpTomr4FQO812AeM43YbgvxbJMvlUF9nryIqkgGpGPwIlaRI77Ut7SWFMc9eWWlAAd8laSCUxMfzlUIejWWmxxbYtrFtfQvhPaHsj5i5JIU6knwTlTC_IFncoRB0I4-aTSW0_ZpL4Pb8wqtSjlhvCM3i7TtLvPl9UJMgoBihjA1-KoStdRbumpJLUswpAWy1mYp4ONxK0UDmTKjmAltUpyggDk9KwzXXLIN9J7a-SD8V2Wg"/>
</div>
</div>
</header>
<main class="relative min-h-screen pt-16 pb-32 overflow-hidden">
<!-- Live Feed Container (Full Bleed Mobile, Inset Web) -->
<div class="relative w-full h-[707px] md:h-[751px] md:max-w-6xl md:mx-auto md:mt-4 md:rounded-xl overflow-hidden shadow-2xl bg-surface-container-highest">
<img alt="Live point of view" class="w-full h-full object-cover" data-alt="first-person perspective view of a busy urban sidewalk with modern architecture, sunlight filtering through glass buildings, and people walking in the distance" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAlOMaLqMEX2Lx3zzgS7887BNUh_AXs49PqQyXzTL1le-ieEdbl7NNW3jQebJ1W6QUm1oS_UFaTaWppPXiOH3N7fU6kLrZSDbfTyWFUhRHa8Kk8MwIged5UGY_8SjHzfEvgWfp8yUSzw5Ddna2A2bmeGS2ptYlOhvSFqV8Knj1EpPd8C5P7FKY-d_oDRRCg19VW1LK3pelcw_V6HO8OObmqUdcWfsztO1mc1U8vHl-nvAdu8d_ogezvwuE8WZQmk9MdXGc2jesbbxg"/>
<!-- Glass Overlay Content -->
<div class="absolute inset-0 pointer-events-none p-6 flex flex-col justify-between">
<!-- Status & Metadata -->
<div class="flex justify-between items-start w-full">
<div class="flex items-center gap-3 px-4 py-2 bg-slate-900/40 backdrop-blur-md rounded-full border border-white/10 pointer-events-auto">
<span class="flex h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
<span class="text-white text-xs font-bold tracking-widest uppercase font-label">Connected</span>
</div>
<div class="flex flex-col gap-2 items-end pointer-events-auto">
<div class="px-4 py-2 bg-slate-900/40 backdrop-blur-md rounded-full border border-white/10 flex items-center gap-2">
<span class="material-symbols-outlined text-white text-sm" data-icon="battery_full">battery_full</span>
<span class="text-white text-xs font-bold font-label">88%</span>
</div>
<div class="px-4 py-2 bg-slate-900/40 backdrop-blur-md rounded-full border border-white/10 flex items-center gap-2">
<span class="material-symbols-outlined text-white text-sm" data-icon="wifi">wifi</span>
<span class="text-white text-xs font-bold font-label">Stable</span>
</div>
</div>
</div>
<!-- AI Analysis Overlay (Asymmetric UI) -->
</div>
<!-- Viewport Scanlines Effect -->
<div class="absolute inset-0 pointer-events-none opacity-10 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_2px,3px_100%]"></div>
</div>
<!-- Floating Action Button Area -->
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-6 left-6 right-6 z-50 flex justify-around items-center h-16 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-2xl rounded-2xl shadow-xl border border-white/20"><!-- Live View Tab -->
<a class="flex flex-col items-center justify-center flex-1 text-violet-600 dark:text-violet-400 transition-all duration-300 active:scale-125" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="sensors">sensors</span>
</a>
<!-- Devices Tab -->
<a class="flex flex-col items-center justify-center flex-1 text-zinc-500 dark:text-zinc-400 hover:text-violet-500 dark:hover:text-violet-300 transition-colors active:scale-125" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="router">router</span>
</a>
<!-- Settings Tab -->
<a class="flex flex-col items-center justify-center flex-1 text-zinc-500 dark:text-zinc-400 hover:text-violet-500 dark:hover:text-violet-300 transition-colors active:scale-125" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="tune">tune</span>
</a></nav>
</body></html>
